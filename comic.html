<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comic PUR</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a001f,#1a003f);
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  background:#111;
  position:sticky;
  top:0;
  z-index:100;
}

.logo img{
  width:55px;
  height:55px;
  border-radius:50%;
  border:2px solid #00d4ff;
}

.heading img{
  height:90px; /* BIG TITLE FIX */
  object-fit:contain;
}

.search img{
  width:42px;
  cursor:pointer;
}

/* COVER */
.cover{
  width:90%;
  max-width:400px;
  display:block;
  margin:20px auto;
  border-radius:15px;
}

/* SUMMARY */
.summary{
  padding:15px;
  margin:10px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

/* EPISODES */
.episodes-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.btn{
  display:block;
  background:linear-gradient(45deg,#00d4ff,#ff4fd8);
  color:white;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 4px 15px rgba(0,212,255,0.3);
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(255,79,216,0.4);
}

/* PAGINATION */
.pagination{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
  padding:10px;
}

.page-btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}

.page-btn.active{
  background:#00d4ff;
  color:black;
}

/* SEARCH */
.search-bar{
  width:90%;
  margin:10px auto;
  display:block;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
}
</style>
</head>

<body>

<!-- ACCESS CONTROL -->
<script>
function getCookie(name) {
  let matches = document.cookie.match(new RegExp(
    "(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"
  ));
  return matches ? decodeURIComponent(matches[1]) : "";
}

if (getCookie("site_access") !== "true") {
  document.documentElement.innerHTML = `
    <head><title>Access Blocked</title></head>
    <body style="margin:0; background:#111; color:white; font-family:Arial; text-align:center; padding:50px;">
      <div style="font-size:24px; background:#900; padding:30px; border-radius:15px; max-width:90%; margin:auto;">
        ⚠️ Direct Access Blocked<br><br>
        Shortener solve karke hi site open hogi.<br><br>
        <a href="https://gplinks.co/BFmfakvr" style="color:#fff; background:#f00; padding:15px; border-radius:10px; text-decoration:none;">Unlock Site</a>
      </div>
    </body>`;
  throw new Error("Blocked");
}
</script>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="../assets/logo.png">
  </div>

  <div class="heading">
    <img src="../assets/logo-circle.png">
  </div>

  <div class="search" onclick="location.href='../search.html'">
    <img src="../assets/search.png">
  </div>
</header>

<!-- COVER -->
<img id="cover" class="cover">

<!-- SUMMARY -->
<div class="summary" id="summary"></div>

<!-- SEARCH EPISODE -->
<input class="search-bar" id="search" placeholder="Episode number search..." onkeyup="filterEpisodes()">

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<!-- EPISODES -->
<div class="episodes-grid" id="episodesGrid"></div>

<script>
const params = new URLSearchParams(location.search);
const comicSlug = params.get("comic");

let totalEpisodes = 100;
let currentPage = 1;
const perPage = 20;

let comicData={};

fetch("../comics.json")
.then(r=>r.json())
.then(data=>{
  comicData = data.find(c=>c.slug===comicSlug);

  document.getElementById("cover").src = comicData.cover;
  document.getElementById("summary").innerText = comicData.summary;

  totalEpisodes = comicData.episodes;

  render();
});

function render(){
  renderPagination();
  renderEpisodes();
}

/* PAGINATION */
function renderPagination(){
  const pag=document.getElementById("pagination");
  pag.innerHTML="";

  let pages=Math.ceil(totalEpisodes/perPage);

  for(let i=1;i<=pages;i++){
    let btn=document.createElement("button");
    btn.innerText=`${(i-1)*perPage+1}-${Math.min(i*perPage,totalEpisodes)}`;
    btn.className="page-btn"+(i===currentPage?" active":"");

    btn.onclick=()=>{
      currentPage=i;
      renderEpisodes();
      renderPagination();
    };

    pag.appendChild(btn);
  }
}

/* EPISODES */
function renderEpisodes(){
  const grid=document.getElementById("episodesGrid");
  grid.innerHTML="";

  let start=(currentPage-1)*perPage+1;
  let end=Math.min(start+perPage-1,totalEpisodes);

  for(let i=start;i<=end;i++){
    let a=document.createElement("a");
    a.href=`../reader/${comicSlug}/ch${i}.html`;
    a.className="btn";
    a.innerText="Episode "+i;
    grid.appendChild(a);
  }
}

/* SEARCH */
function filterEpisodes(){
  let val=document.getElementById("search").value;
  const grid=document.getElementById("episodesGrid");
  grid.innerHTML="";

  if(!val){
    renderEpisodes();
    return;
  }

  let num=parseInt(val);
  if(isNaN(num) || num<1 || num>totalEpisodes){
    grid.innerHTML="No episode found";
    return;
  }

  let a=document.createElement("a");
  a.href=`../reader/${comicSlug}/ch${num}.html`;
  a.className="btn";
  a.innerText="Episode "+num;
  grid.appendChild(a);
}
</script>

</body>
</html>
