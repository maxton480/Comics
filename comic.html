<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Pur - Comics</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    /* NAVBAR */
    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:#111;
      position:sticky;
      top:0;
    }

    .logo{
      font-size:20px;
      font-weight:bold;
      color:#00ff66;
    }

    /* FILTERS */
    .filters{
      padding:15px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .filters button{
      padding:8px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#1a1a1a;
      color:white;
    }

    .filters button:hover{
      background:#00ff66;
      color:black;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:15px;
      padding:20px;
    }

    .card{
      background:#1a1a1a;
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .info{
      padding:10px;
    }

    .title{
      font-weight:bold;
      margin-bottom:5px;
    }

    .meta{
      font-size:12px;
      opacity:0.7;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">📚 Comic Pur</div>
    <div>All Comics</div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button onclick="filterGenre('all')">All</button>
    <button onclick="filterGenre('Action')">Action</button>
    <button onclick="filterGenre('Horror')">Horror</button>
    <button onclick="filterGenre('Fantasy')">Fantasy</button>
  </div>

  <!-- GRID -->
  <div class="grid" id="comicGrid"></div>

  <script>
    let comics = [];

    // LOAD JSON DATABASE
    fetch("data/comics.json")
      .then(res => res.json())
      .then(data => {
        comics = data;
        render(comics);
      });

    // RENDER GRID
    function render(list){
      const grid = document.getElementById("comicGrid");
      grid.innerHTML = "";

      list.forEach(c => {
        grid.innerHTML += `
          <div class="card" onclick="openComic('${c.folder}')">
            <img src="${c.cover}">
            <div class="info">
              <div class="title">${c.title}</div>
              <div class="meta">${c.genre} | ${c.chapters} CH</div>
              <div class="meta">${c.rating} | ${c.status}</div>
            </div>
          </div>
        `;
      });
    }

    // FILTER
    function filterGenre(g){
      if(g === "all"){
        render(comics);
      } else {
        render(comics.filter(c => c.genre === g));
      }
    }

    // OPEN COMIC
    function openComic(folder){
      window.location.href = "reader.html?comic=" + folder;
    }

  </script>

</body>
</html>
