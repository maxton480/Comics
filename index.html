<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Pur</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    /* NAVBAR */
    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 20px;
      background:#111;
      position:sticky;
      top:0;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
      color:#00ff66;
    }

    .nav-links a{
      margin-left:15px;
      color:white;
      text-decoration:none;
      font-size:14px;
    }

    /* HERO */
    .hero{
      padding:60px 20px;
      text-align:center;
      background:linear-gradient(135deg,#111,#1a1a1a);
    }

    .hero h1{
      font-size:38px;
      margin-bottom:10px;
    }

    .hero p{
      opacity:0.8;
      margin-bottom:20px;
    }

    .btn{
      padding:12px 25px;
      background:#00ff66;
      color:black;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    /* SECTION */
    .section{
      padding:20px;
    }

    .section h2{
      color:#00ff66;
      margin-bottom:15px;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
      gap:15px;
    }

    .card{
      background:#1a1a1a;
      border-radius:16px;
      overflow:hidden;
      transition:0.3s;
      cursor:pointer;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .info{
      padding:10px;
    }

    .info b{
      display:block;
      margin-bottom:5px;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      padding:20px;
      font-size:12px;
      opacity:0.6;
      margin-top:30px;
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo"> Comic Pur</div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="comics.html">Comics</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Welcome to Comic Pur</h1>
    <p>Read Action • Horror • Fantasy • Web Comics Online</p>
    <button class="btn" onclick="location.href='comics.html'">
      Start Reading
    </button>
  </div>

  <!-- TRENDING -->
  <div class="section">
    <h2>🔥 Trending Comics</h2>

    <div class="grid">

      <div class="card" onclick="openComic('shadow-fighter')">
        <img src="assets/images/sample1.jpg">
        <div class="info">
          <b>Shadow Fighter</b>
          Action | 300 CH
        </div>
      </div>

      <div class="card" onclick="openComic('dark-hero')">
        <img src="assets/images/sample2.jpg">
        <div class="info">
          <b>Dark Hero</b>
          Horror | 120 CH
        </div>
      </div>

    </div>
  </div>

  <!-- FEATURED -->
  <div class="section">
    <h2>⭐ Featured Comics</h2>

    <div class="grid">

      <div class="card" onclick="openComic('blade-king')">
        <img src="assets/images/sample3.jpg">
        <div class="info">
          <b>Blade King</b>
          Fantasy | 200 CH
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Comic Pur • All Rights Reserved
  </div>

  <script>
    function openComic(folder){
      window.location.href = "reader.html?comic=" + folder;
    }
  </script>

</body>
</html>
