<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic PUR</title>

<style>

body{
margin:0;
background:#0f001f;
color:#e0e0ff;
font-family:'Segoe UI',system-ui;
}

/* HEADER */

header{
height:52px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
background:#0a001f;
}

header img{
height:42px;
}

/* FILTER */

.filter{
display:flex;
justify-content:center;
margin:10px;
}

.toggle{
background:#1a003f;
border-radius:20px;
display:flex;
overflow:hidden;
}

.toggle div{
padding:8px 14px;
font-size:12px;
cursor:pointer;
}

.toggle .active{
background:#00d4ff;
color:black;
}

/* SLIDER */

.slider{
overflow:hidden;
position:relative;
margin:10px;
border-radius:16px;
}

.slider-track{
display:flex;
transition:0.4s ease;
}

.slide{
min-width:100%;
position:relative;
}

.slide img{
width:100%;
height:220px;
object-fit:cover;
}

.slide-text{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
max-width:60%;
}

.slide-title{
font-size:28px;
font-weight:900;
}

.slide-info{
font-size:13px;
margin-top:6px;
}

/* BADGE */

.badge{
position:absolute;
top:0;
right:0;
padding:4px 8px;
font-size:11px;
font-weight:bold;
border-bottom-left-radius:10px;
}

.pg{background:#00c853;}
.ad{background:#ff1744;}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

.card{
position:relative;
border-radius:14px;
overflow:hidden;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
padding:8px;
background:linear-gradient(transparent,black);
width:100%;
font-size:13px;
}

.ep{
font-size:11px;
opacity:.8;
}

a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<header>
<img src="assets/heading.png">
<img src="assets/logo-circle.png">
<img src="assets/search-icon.png" onclick="location.href='search.html'">
</header>

<!-- FILTER -->
<div class="filter">
<div class="toggle">
<div onclick="setMode(event,'pg')">PG</div>
<div class="active" onclick="setMode(event,'all')">ALL</div>
<div onclick="setMode(event,'adult')">18+</div>
</div>
</div>

<!-- SLIDER -->
<div class="slider">
<div class="slider-track" id="slider"></div>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>

let mode="all";
let comicsData=[];
let episodesData=[];

/* FILTER FIX */

function setMode(e,m){
mode=m;
document.querySelectorAll(".toggle div").forEach(el=>el.classList.remove("active"));
e.target.classList.add("active");
render();
}

/* LOAD JSON */

Promise.all([
fetch("data/comics.json").then(r=>r.json()),
fetch("data/episodes.json").then(r=>r.json())
])
.then(([c,e])=>{
comicsData=c.comics;
episodesData=e.episodes;
render();
});

/* MAIN RENDER */

function render(){

let list=[...comicsData];

/* FILTER */

if(mode==="pg"){
list=list.filter(c=>c.badge==="PG-13");
}
if(mode==="adult"){
list=list.filter(c=>c.badge==="AD-18");
}

/* SLIDER */

const slider=document.getElementById("slider");
slider.innerHTML="";
let slideIndex=0;

list.forEach(c=>{

if(c.slider && c.slider.enabled){

let ep = episodesData.find(e=>e.slug===c.slug);

slider.innerHTML+=`
<div class="slide">

<span class="badge ${c.badge==="AD-18"?"ad":"pg"}">
${c.badge}
</span>

<img src="${c.slider.image}">

<div class="slide-text">
<div class="slide-title">${c.title}</div>
<div class="slide-info">
${ep ? ep.total+" Episodes" : ""}
</div>
</div>

</div>
`;

}

});

/* GRID */

const grid=document.getElementById("grid");
grid.innerHTML="";

list.forEach(c=>{

let ep = episodesData.find(e=>e.slug===c.slug);

grid.innerHTML+=`
<a href="comic.html?comic=${c.slug}">

<div class="card">

<span class="badge ${c.badge==="AD-18"?"ad":"pg"}">
${c.badge}
</span>

<img src="${c.cover}">

<div class="overlay">
${c.title}<br>
<span class="ep">
${ep ? ep.total+" Episodes" : ""}
</span>
</div>

</div>

</a>
`;

});

initSlider();
}

/* TOUCH SLIDER FIXED */

function initSlider(){

let track=document.getElementById("slider");
let index=0;
let startX=0;

track.style.transform="translateX(0)";

track.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

track.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50) index++;
if(endX-startX>50) index--;

let slides=document.querySelectorAll(".slide");

if(index<0) index=0;
if(index>=slides.length) index=slides.length-1;

track.style.transform=`translateX(-${index*100}%)`;
});

}

</script>

</body>
</html>
