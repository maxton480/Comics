<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic PUR</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0f001f;
color:#e0e0ff;
font-family:'Segoe UI',system-ui,sans-serif;
}

/* HEADER */

header{
padding:6px 12px;
display:flex;
align-items:center;
justify-content:space-between;
background:linear-gradient(to right,#0a001f,#1a003f);
border-bottom:1px solid rgba(0,212,255,0.25);
height:48px;
}

.logo img{
width:36px;
height:36px;
border-radius:50%;
border:2px solid #00d4ff;
}

.heading-img{
max-width:160px;
}

.search-icon{
width:42px;
cursor:pointer;
}


/* SLIDER */

.slider{
width:100%;
overflow:hidden;
position:relative;
}

.slide{
display:none;
position:relative;
}

.slide img{
width:100%;
height:220px;
object-fit:cover;
}

.slide-text{

position:absolute;
top:16px;
left:16px;

}

.slide-title{

font-size:28px;
font-weight:900;
letter-spacing:1px;
text-shadow:0 0 10px black;

}

.slide-info{

font-size:14px;
margin-top:4px;
font-weight:600;
text-shadow:0 0 6px black;

}


/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:16px;

}

.card{

border-radius:16px;
overflow:hidden;
position:relative;
aspect-ratio:2/3;
box-shadow:0 8px 25px rgba(0,0,0,0.6);

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

.overlay{

position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));

}

.title{
font-size:14px;
font-weight:700;
}

.episodes{
font-size:12px;
opacity:.9;
}

.genre{
font-size:11px;
opacity:.8;
}


/* BADGE */

.badge{

position:absolute;
top:0;
right:0;

font-size:11px;
padding:4px 8px;

border-bottom-left-radius:10px;

font-weight:bold;
color:white;

}

.pg{
background:#00c853;
}

.adult{
background:#ff1744;
}


a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>


<header>

<div class="logo">
<img src="assets/heading.png">
</div>

<img src="assets/logo-circle.png" class="heading-img">

<img src="assets/search-icon.png" class="search-icon" onclick="location.href='search.html'">

</header>


<!-- SLIDER -->

<div class="slider" id="slider"></div>


<!-- GRID -->

<div class="grid" id="comicGrid"></div>


<script>

fetch("comic.json")
.then(res=>res.json())
.then(data=>{

const comics=data.comics;


/* DATE SORT */

comics.sort((a,b)=> new Date(b.date)-new Date(a.date));


/* SLIDER */

const slider=document.getElementById("slider");

comics.forEach(c=>{

if(c.slider.enabled){

slider.innerHTML+=`

<a href="${c.page}">
<div class="slide">

<img src="${c.slider.image}">

<div class="slide-text">

<div class="slide-title">
${c.title}
</div>

<div class="slide-info">
${c.episodes} Episodes • ${c.genre.join(", ")}
</div>

</div>

</div>
</a>

`;

}

});


/* AUTO SLIDE */

let slides=document.querySelectorAll(".slide");

let i=0;

function showSlide(){

slides.forEach(s=>s.style.display="none");

i++;

if(i>slides.length){i=1;}

slides[i-1].style.display="block";

setTimeout(showSlide,3000);

}

if(slides.length>0){
showSlide();
}



/* GRID */

const grid=document.getElementById("comicGrid");

comics.forEach(comic=>{

let badgeClass="pg";

if(comic.badge==="18+" || comic.badge==="AD-18"){
badgeClass="adult";
}

grid.innerHTML+=`

<a href="${comic.page}">

<div class="card">

<span class="badge ${badgeClass}">
${comic.badge}
</span>

<img src="${comic.cover}">

<div class="overlay">

<div class="title">
${comic.title}
</div>

<div class="episodes">
Episodes: ${comic.episodes}
</div>

<div class="genre">
${comic.genre[0]}
</div>

</div>

</div>

</a>

`;

});

});

</script>

</body>
</html>
