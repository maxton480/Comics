<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic PUR</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f001f;color:#e0e0ff;font-family:'Segoe UI',system-ui,sans-serif;}

/* HEADER */
header{
  padding:6px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(to right,#0a001f,#1a003f);
  border-bottom:1px solid rgba(0,212,255,0.25);
  height:50px;
}
.logo img{width:38px;height:38px;border-radius:50%;border:2px solid #00d4ff;}
.heading-img{max-width:190px;}
.search-icon{width:44px;cursor:pointer;}

/* SLIDER */
.slider{
  width:100%;
  overflow:hidden;
  position:relative;
  border-radius:18px;
  margin:10px 0;
  touch-action: pan-y;
}
.slides-container{
  display:flex;
  transition:transform 0.5s ease;
}
.slide{
  min-width:100%;
  position:relative;
}
.slide img{
  width:100%;
  height:230px;
  object-fit:cover;
  border-radius:18px;
}
.slide-text{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  max-width:55%;
}
.slide-title{
  font-size:30px;
  font-weight:900;
  letter-spacing:1px;
  text-shadow:0 0 10px black;
}
.slide-info{
  font-size:14px;
  margin-top:6px;
  font-weight:600;
  text-shadow:0 0 6px black;
}
/* BADGE */
.badge{
  position:absolute;
  top:0;
  right:0;
  font-size:11px;
  padding:4px 8px;
  border-bottom-left-radius:10px;
  font-weight:bold;
  color:white;
}
.pg{background:#00c853;}
.adult{background:#ff1744;}

/* SLIDER DOTS */
.slider-dots{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
}
.dot{
  width:8px;
  height:8px;
  background:#888;
  border-radius:50%;
}
.dot.active{background:#00d4ff;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  padding:16px;
}
.card{
  border-radius:16px;
  overflow:hidden;
  position:relative;
  aspect-ratio:2/3;
  box-shadow:0 8px 25px rgba(0,0,0,0.6);
}
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));
}
.title{font-size:14px;font-weight:700;}
.episodes{font-size:12px;opacity:.9;}
.genre{font-size:11px;opacity:.8;}

/* ALL COMICS BUTTON */
.all-comics-btn{
  display:block;
  margin:20px auto;
  padding:12px 28px;
  background:#00d4ff;
  color:#111;
  font-weight:bold;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  width:max-content;
  text-decoration:none;
  box-shadow:0 4px 15px rgba(0,212,255,0.5);
}

a{text-decoration:none;color:white;}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="assets/heading.png"></div>
  <img src="assets/logo-circle.png" class="heading-img">
  <img src="assets/search-icon.png" class="search-icon" onclick="location.href='search.html'">
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slides-container" id="slider"></div>
  <div class="slider-dots" id="dots"></div>
</div>

<!-- RECENT COMICS GRID -->
<div class="grid" id="comicGrid"></div>

<!-- ALL COMICS BUTTON -->
<a href="all-comics/page1.html" class="all-comics-btn">ALL COMICS</a>

<script>
fetch("comic.json")
.then(res=>res.json())
.then(data=>{
  const comics=data.comics;
  comics.sort((a,b)=> new Date(b.date)-new Date(a.date));

  /* SLIDER */
  const slider=document.getElementById("slider");
  const dots=document.getElementById("dots");

  comics.forEach(c=>{
    if(c.slider.enabled){
      let badgeClass=c.badge==="AD-18"?"adult":"pg";
      slider.innerHTML+=`
        <a href="${c.page}">
          <div class="slide">
            <span class="badge ${badgeClass}">${c.badge}</span>
            <img src="${c.slider.image}">
            <div class="slide-text">
              <div class="slide-title">${c.title}</div>
              <div class="slide-info">${c.episodes} Episodes • ${c.genre.join(", ")}</div>
            </div>
          </div>
        </a>`;
      dots.innerHTML+=`<div class="dot"></div>`;
    }
  });

  const slides=document.querySelectorAll(".slide");
  const dot=document.querySelectorAll(".dot");
  let slideIndex=0;
  let startX=0, currentX=0, isDragging=false;

  function updateSlider(index){
    slider.style.transform=`translateX(-${index*100}%)`;
    dot.forEach(d=>d.classList.remove("active"));
    if(dot[index]) dot[index].classList.add("active");
  }

  function nextSlide(){
    slideIndex = (slideIndex+1)%slides.length;
    updateSlider(slideIndex);
  }

  let autoSlide=setInterval(nextSlide,3000);

  // Swipe
  const container=slider.parentElement;
  container.addEventListener("mousedown", startDrag);
  container.addEventListener("mousemove", drag);
  container.addEventListener("mouseup", endDrag);
  container.addEventListener("mouseleave", endDrag);
  container.addEventListener("touchstart", startDrag);
  container.addEventListener("touchmove", drag);
  container.addEventListener("touchend", endDrag);

  function startDrag(e){
    clearInterval(autoSlide);
    isDragging=true;
    startX=e.type.includes("touch")? e.touches[0].clientX:e.clientX;
  }
  function drag(e){
    if(!isDragging) return;
    currentX=e.type.includes("touch")? e.touches[0].clientX:e.clientX;
    let diff=currentX-startX;
    slider.style.transform=`translateX(-${slideIndex*100 - diff/slides[0].offsetWidth*100}%)`;
  }
  function endDrag(){
    if(!isDragging) return;
    isDragging=false;
    let diff=currentX-startX;
    if(diff>50) slideIndex=(slideIndex-1+slides.length)%slides.length;
    if(diff<-50) slideIndex=(slideIndex+1)%slides.length;
    updateSlider(slideIndex);
    autoSlide=setInterval(nextSlide,3000);
  }
  if(slides.length>0) updateSlider(0);

  /* RECENT 10 COMICS GRID */
  const grid=document.getElementById("comicGrid");
  comics.slice(0,10).forEach(comic=>{
    let badgeClass=comic.badge==="AD-18"?"adult":"pg";
    grid.innerHTML+=`
      <a href="${comic.page}">
        <div class="card">
          <span class="badge ${badgeClass}">${comic.badge}</span>
          <img src="${comic.cover}">
          <div class="overlay">
            <div class="title">${comic.title}</div>
            <div class="episodes">Episodes: ${comic.episodes}</div>
            <div class="genre">${comic.genre.join(", ")}</div>
          </div>
        </div>
      </a>`;
  });
});
</script>
</body>
</html>
