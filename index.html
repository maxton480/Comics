<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comic Reader</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0f001f;
color:#e0e0ff;
font-family:'Segoe UI',system-ui,sans-serif;
}

header{
padding:10px 16px;
display:flex;
align-items:center;
justify-content:space-between;
background:linear-gradient(to right,#0a001f,#1a003f);
border-bottom:1px solid rgba(0,212,255,0.25);
height:64px;
}

.logo img{
width:52px;
height:52px;
border-radius:50%;
border:3px solid #00d4ff;
box-shadow:0 0 20px rgba(0,212,255,0.6);
}

.heading-img{
max-width:220px;
margin:auto;
}

.search-icon{
width:68px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:16px;
max-width:1200px;
margin:auto;
}

.card{
border-radius:16px;
overflow:hidden;
position:relative;
aspect-ratio:2/3;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.title{
font-size:14px;
font-weight:700;
}

.episodes{
font-size:12px;
opacity:.9;
}

.badge{
position:absolute;
top:6px;
right:6px;
font-size:10px;
padding:3px 6px;
border-radius:4px;
font-weight:bold;
color:white;
}

.pg{background:#00c853;}
.adult{background:#ff1744;}

a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="assets/heading.png">
</div>

<div>
<img src="assets/logo-circle.png" class="heading-img">
</div>

<div>
<img src="assets/search-icon.png" class="search-icon" onclick="window.location.href='search.html'">
</div>

</header>


<div class="grid" id="comicGrid"></div>


<script>

fetch("comic.json")
.then(res=>res.json())
.then(data=>{

data.sort((a,b)=> new Date(b.date)-new Date(a.date));

const grid=document.getElementById("comicGrid");

data.forEach(comic=>{

const card=`

<a href="${comic.page}">
<div class="card">

<span class="badge ${comic.badge}">
${comic.badge==="pg"?"PG-13":"18+"}
</span>

<img src="${comic.cover}">

<div class="overlay">
<div class="title">${comic.title}</div>
<div class="episodes">Episodes: ${comic.episodes}</div>
</div>

</div>
</a>

`;

grid.innerHTML+=card;

});

});

</script>

</body>
</html>
