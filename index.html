<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic PUR</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f001f;
color:white;
font-family:Poppins;
}


/* HEADER */

header{
padding:10px 16px;
display:flex;
align-items:center;
justify-content:space-between;
background:linear-gradient(to right,#0a001f,#1a003f);
border-bottom:1px solid rgba(0,212,255,0.25);
}

.logo img{
width:52px;
height:52px;
border-radius:50%;
}

.heading-img{
max-width:200px;
}

.search-icon{
width:60px;
cursor:pointer;
}


/* SLIDER */

.slider{
width:100%;
overflow:hidden;
position:relative;
}

.slide{
display:none;
position:relative;
}

.slide img{
width:100%;
height:220px;
object-fit:cover;
}


/* TITLE */

.slide-title{
position:absolute;
top:20px;
left:20px;

font-size:36px;
font-family:'Bebas Neue';
letter-spacing:2px;

text-shadow:0 4px 20px rgba(0,0,0,0.8);
}


/* BADGE */

.badge{
position:absolute;
top:20px;
right:20px;

padding:4px 10px;
border-radius:6px;

font-size:12px;
font-weight:bold;
}

.pg{
background:#00c853;
}

.adult{
background:#ff1744;
}


/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:16px;
}

.card{
border-radius:14px;
overflow:hidden;
position:relative;
aspect-ratio:2/3;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;

background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.title{
font-size:14px;
font-weight:700;
}

.episodes{
font-size:12px;
opacity:.9;
}

.genre{
font-size:11px;
opacity:.8;
}

a{
text-decoration:none;
color:white;
}

</style>

</head>



<body>


<header>

<div class="logo">
<img src="assets/heading.png">
</div>

<div>
<img src="assets/logo-circle.png" class="heading-img">
</div>

<div>
<img src="assets/search-icon.png" class="search-icon" onclick="location.href='search.html'">
</div>

</header>



<!-- SLIDER -->

<div class="slider" id="slider"></div>



<!-- GRID -->

<div class="grid" id="comicGrid"></div>



<script>

fetch("comic.json")
.then(res=>res.json())
.then(data=>{

const comics=data.comics


/* DATE SORT */

comics.sort((a,b)=> new Date(b.date)-new Date(a.date))


/* SLIDER */

const slider=document.getElementById("slider")

comics.forEach(c=>{

if(c.slider.enabled){

let badgeClass="pg"

if(c.badge==="18+" || c.badge==="AD-18"){
badgeClass="adult"
}

slider.innerHTML+=`

<a href="${c.page}">
<div class="slide">

<img src="${c.slider.image}">

<div class="slide-title">
${c.title}
</div>

<span class="badge ${badgeClass}">
${c.badge}
</span>

</div>
</a>

`

}

})



/* AUTO SLIDE */

let slides=document.querySelectorAll(".slide")
let i=0

function showSlide(){

slides.forEach(s=>s.style.display="none")

i++

if(i>slides.length){i=1}

slides[i-1].style.display="block"

setTimeout(showSlide,3000)

}

if(slides.length>0){
showSlide()
}



/* GRID */

const grid=document.getElementById("comicGrid")

comics.forEach(comic=>{

let badgeClass="pg"

if(comic.badge==="18+" || comic.badge==="AD-18"){
badgeClass="adult"
}

grid.innerHTML+=`

<a href="${comic.page}">
<div class="card">

<span class="badge ${badgeClass}">
${comic.badge}
</span>

<img src="${comic.cover}">

<div class="overlay">

<div class="title">
${comic.title}
</div>

<div class="episodes">
Episodes: ${comic.episodes}
</div>

<div class="genre">
${comic.genre[0]}
</div>

</div>

</div>
</a>

`

})

})

</script>



</body>
</html>
