<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search - Comic Pur</title>

<style>
:root {
  --primary: #00d4ff;
  --accent: #ff69b4;
  --dark: #0a001f;
  --glow: rgba(0, 212, 255, 0.7);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(135deg, var(--dark), #1a003f);
  color: white;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

/* HEADER SAME */
header {
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10, 0, 31, 0.92);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(0, 212, 255, 0.35);
  height: 64px;
}

.logo img {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 3px solid var(--primary);
  box-shadow: 0 0 20px var(--glow);
}

.heading-img {
  max-width: 220px;
}

.search-icon {
  width: 60px;
  cursor: pointer;
  filter: drop-shadow(0 0 15px var(--glow));
}

/* SEARCH BOX */
.container {
  padding: 15px;
}

.search-box {
  width: 100%;
  padding: 14px 18px;
  border-radius: 30px;
  border: 2px solid rgba(0,212,255,0.4);
  background: rgba(34,34,60,0.8);
  color: white;
  font-size: 16px;
  outline: none;
  margin-bottom: 20px;
}

/* RESULTS GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
  gap: 14px;
}

/* CARD SAME AS HOME */
.card {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 8px;
  background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
}

.title {
  font-size: 13px;
  font-weight: bold;
}

.meta {
  font-size: 11px;
  color: #ccc;
}

.empty {
  text-align: center;
  margin-top: 50px;
  color: #aaa;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="assets/heading.png">
  </div>

  <img src="assets/logo-circle.png" class="heading-img">

  <img src="assets/search-icon.png" class="search-icon"
       onclick="window.location.href='search.html'">
</header>

<div class="container">
  <input type="text" id="searchInput" class="search-box" placeholder="Search comics...">

  <div class="grid" id="results"></div>
  <div id="emptyMsg" class="empty"></div>
</div>

<script>
let comics = [];

fetch("comics.json")
.then(res => res.json())
.then(data => {
  comics = data.comics.filter(c => c.show);
});

document.getElementById("searchInput").addEventListener("input", function() {

  const value = this.value.toLowerCase();
  const results = document.getElementById("results");
  const emptyMsg = document.getElementById("emptyMsg");

  results.innerHTML = "";
  emptyMsg.innerHTML = "";

  if (!value) return;

  let found = false;

  comics.forEach(c => {
    if (
      c.title.toLowerCase().includes(value) ||
      c.genre.toLowerCase().includes(value)
    ) {
      found = true;

      results.innerHTML += `
        <div class="card" onclick="openComic('${c.link}')">
          <img src="${c.cover}">
          <div class="overlay">
            <div class="title">${c.title}</div>
            <div class="meta">Episodes: ${c.episodes}</div>
            <div class="meta">${c.genre}</div>
          </div>
        </div>
      `;
    }
  });

  if (!found) {
    emptyMsg.innerHTML = "❌ No comics found";
  }

});

function openComic(link) {
  window.location.href = link;
}
</script>

</body>
</html>
