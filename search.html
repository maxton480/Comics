<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search Comic</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial, sans-serif;
color:white;
}

header{
text-align:center;
padding:30px 10px;
}

h1{
color:#1e40af;
font-size:32px;
letter-spacing:1px;
font-weight:800;
font-family:Verdana, sans-serif;
margin-bottom:20px;
}

#searchInput{
width:85%;
max-width:420px;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
outline:none;
}

.comic-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.comic-card{
position:relative;
border-radius:10px;
overflow:hidden;
background:#1e293b;
transition:0.2s;
}

.comic-card:hover{
transform:scale(1.05);
}

.comic-card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.comic-info{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent, rgba(0,0,0,0.9));
box-sizing:border-box;
}

.comic-title{
font-size:14px;
font-weight:bold;
}

.episodes{
font-size:12px;
opacity:0.8;
}

.badge{
position:absolute;
top:8px;
right:8px;
padding:3px 6px;
font-size:11px;
border-radius:4px;
font-weight:bold;
}

.pg{
background:#16a34a;
}

.adult{
background:#dc2626;
}

.message{
text-align:center;
margin-top:40px;
opacity:0.6;
}

</style>

</head>

<body>

<header>

<h1>Search Comic</h1>

<input type="text" id="searchInput" placeholder="Search comics...">

</header>

<div id="message" class="message">
Start typing to search comics
</div>

<div class="comic-grid" id="comicGrid"></div>

<script>

let comics = [];

fetch("comic.json")
.then(res => res.json())
.then(data => {

comics = data;

});


function displayComics(list){

const grid = document.getElementById("comicGrid");
const message = document.getElementById("message");

grid.innerHTML = "";

if(list.length === 0){

message.innerText = "No comics found";
return;

}

message.style.display = "none";

list.forEach(comic => {

const badgeClass = comic.badge === "18+" ? "adult" : "pg";

grid.innerHTML += `

<div class="comic-card">

<img src="${comic.cover}">

<div class="badge ${badgeClass}">
${comic.badge}
</div>

<div class="comic-info">

<div class="comic-title">
${comic.title}
</div>

<div class="episodes">
${comic.episodes} Episodes
</div>

</div>

</div>

`;

});

}


document.getElementById("searchInput")
.addEventListener("input", function(){

const value = this.value.toLowerCase().trim();

const grid = document.getElementById("comicGrid");
const message = document.getElementById("message");

if(value === ""){

grid.innerHTML = "";
message.style.display = "block";
message.innerText = "Start typing to search comics";

return;

}

const filtered = comics.filter(c =>
c.title.toLowerCase().includes(value)
);

displayComics(filtered);

});

</script>

</body>

</html>
