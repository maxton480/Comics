<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search Comics - Comic PUR</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0a001f;
  color:white;
}

/* HEADER (SAME AS INDEX) */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 14px;
  background:#111;
  position:sticky;
  top:0;
  z-index:100;
}

.logo img{
  width:55px;
  height:55px;
  border-radius:50%;
}

.heading img{
  height:90px;
}

.search img{
  width:40px;
  cursor:pointer;
}

/* SEARCH BOX */
.search-box{
  width:90%;
  margin:15px auto;
  display:block;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:16px;
}

/* GRID SAME AS INDEX */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.grid-item{
  position:relative;
  cursor:pointer;
}

.grid-item img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

.grid-overlay{
  position:absolute;
  bottom:0;
  width:100%;
  padding:8px;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="assets/logo.png">
  </div>

  <div class="heading">
    <img src="assets/logo-circle.png">
  </div>

  <div class="search" onclick="location.href='index.html'">
    <img src="assets/search.png">
  </div>
</header>

<!-- SEARCH INPUT -->
<input class="search-box" id="searchInput" placeholder="Search comics..." onkeyup="searchComics()">

<!-- RESULTS -->
<div class="grid" id="grid"></div>

<script>

let comics=[];

fetch("comics.json")
.then(r=>r.json())
.then(data=>{
  comics=data;
  render(comics);
});

/* INITIAL RENDER */
function render(list){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  list.forEach(c=>{
    grid.innerHTML+=`
      <div class="grid-item" onclick="openComic('${c.slug}')">
        <img src="${c.cover}">
        <div class="grid-overlay">${c.title}</div>
      </div>
    `;
  });
}

/* LIVE SEARCH */
function searchComics(){
  let val=document.getElementById("searchInput").value.toLowerCase();

  let filtered=comics.filter(c=>
    c.title.toLowerCase().includes(val)
  );

  render(filtered);
}

/* OPEN COMIC */
function openComic(slug){
  location.href=`comic.html?comic=${slug}`;
}

</script>

</body>
</html>
