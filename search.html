<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search - Comic PUR</title>

<style>

body{
margin:0;
background:#0f001f;
color:#e0e0ff;
font-family:'Segoe UI',system-ui;
}

/* HEADER */

header{
height:52px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
background:#0a001f;
}

header img{
height:42px;
}

/* SEARCH BOX */

.search-box{
padding:14px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1a003f;
color:white;
font-size:14px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:14px;
}

.card{
position:relative;
border-radius:14px;
overflow:hidden;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
padding:8px;
background:linear-gradient(transparent,black);
width:100%;
font-size:13px;
}

.badge{
position:absolute;
top:0;
right:0;
padding:4px 8px;
font-size:11px;
font-weight:bold;
border-bottom-left-radius:10px;
}

.pg{background:#00c853;}
.ad{background:#ff1744;}

a{
text-decoration:none;
color:white;
}

.no-result{
text-align:center;
margin-top:30px;
opacity:.7;
}

</style>
</head>

<body>

<header>
<img src="assets/heading.png">
<img src="assets/logo-circle.png">
<img src="assets/search-icon.png" onclick="location.href='index.html'">
</header>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search comics..." onkeyup="search()">
</div>

<!-- RESULT -->
<div class="grid" id="grid"></div>

<div id="noResult" class="no-result"></div>

<script>

let comicsData=[];
let episodesData=[];

/* LOAD JSON */

Promise.all([
fetch("data/comics.json").then(r=>r.json()),
fetch("data/episodes.json").then(r=>r.json())
])
.then(([c,e])=>{
comicsData=c.comics;
episodesData=e.episodes;
render(comicsData);
});

/* RENDER */

function render(list){

const grid=document.getElementById("grid");
const noResult=document.getElementById("noResult");

grid.innerHTML="";
noResult.innerHTML="";

if(list.length===0){
noResult.innerHTML="No comics found";
return;
}

list.forEach(c=>{

let ep = episodesData.find(e=>e.slug===c.slug);

grid.innerHTML+=`
<a href="comic.html?comic=${c.slug}">

<div class="card">

<span class="badge ${c.badge==="AD-18"?"ad":"pg"}">
${c.badge}
</span>

<img src="${c.cover}">

<div class="overlay">
${c.title}<br>
<span style="font-size:11px;">
${ep ? ep.total+" Episodes" : ""}
</span>
</div>

</div>

</a>
`;

});

}

/* SEARCH */

function search(){

let value=document.getElementById("searchInput").value.toLowerCase();

let filtered=comicsData.filter(c=>
c.title.toLowerCase().includes(value)
);

render(filtered);

}

</script>

</body>
</html>
