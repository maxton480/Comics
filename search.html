<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search - Comic PUR</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0f001f;
color:#e0e0ff;
font-family:'Segoe UI',system-ui,sans-serif;
}

.search-header{
text-align:center;
padding:20px 16px;
position:sticky;
top:0;
background:#0f001f;
z-index:10;
}

.search-title{
font-size:24px;
font-weight:800;
margin-bottom:10px;
}

#searchInput{
width:90%;
max-width:420px;
padding:14px 18px;
border-radius:40px;
border:2px solid #00d4ff;
background:#160033;
color:white;
font-size:15px;
outline:none;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:16px;
max-width:1200px;
margin:auto;
}

.card{
border-radius:16px;
overflow:hidden;
position:relative;
aspect-ratio:2/3;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent,rgba(0,0,0,0.9));
}

.title{
font-size:14px;
font-weight:700;
}

.episodes{
font-size:12px;
opacity:.9;
}

.badge{
position:absolute;
top:6px;
right:6px;
font-size:10px;
padding:3px 6px;
border-radius:4px;
font-weight:bold;
color:white;
}

.pg{background:#00c853;}
.adult{background:#ff1744;}

.message{
text-align:center;
margin-top:30px;
opacity:.6;
}

a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<div class="search-header">

<div class="search-title">
Search Comic
</div>

<input type="text" id="searchInput" placeholder="Search comics...">

</div>

<div id="message" class="message">
Start typing to search comics
</div>

<div class="grid" id="comicGrid"></div>

<script>

let comics=[];

fetch("comic.json")
.then(res=>res.json())
.then(data=>{

data.sort((a,b)=> new Date(b.date) - new Date(a.date));
comics=data;

});

function displayComics(list){

const grid=document.getElementById("comicGrid");
const message=document.getElementById("message");

grid.innerHTML="";

if(list.length===0){

message.style.display="block";
message.innerText="No comics found";
return;

}

message.style.display="none";

list.forEach(comic=>{

let badgeText="PG-13";
let badgeClass="pg";

if(comic.badge==="adult"){
badgeText="AD-18";
badgeClass="adult";
}

const card=`
<a href="${comic.page}">
<div class="card">

<span class="badge ${badgeClass}">
${badgeText}
</span>

<img src="${comic.cover}">

<div class="overlay">
<div class="title">${comic.title}</div>
<div class="episodes">Episodes: ${comic.episodes}</div>
</div>

</div>
</a>
`;

grid.innerHTML+=card;

});

}

document.getElementById("searchInput").addEventListener("input",function(){

const value=this.value.toLowerCase().trim();

const grid=document.getElementById("comicGrid");
const message=document.getElementById("message");

if(value===""){

grid.innerHTML="";
message.style.display="block";
message.innerText="Start typing to search comics";

return;

}

const filtered=comics.filter(c =>
c.title.toLowerCase().includes(value)
);

displayComics(filtered);

});

</script>

</body>
</html>
