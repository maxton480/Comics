<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search Comic</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:20px;
}

h1{
color:#1e40af;
font-size:28px;
margin-bottom:15px;
}

#searchInput{
width:80%;
max-width:400px;
padding:10px;
border-radius:8px;
border:none;
font-size:16px;
}

.comic-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.comic-card{
position:relative;
border-radius:10px;
overflow:hidden;
background:#1e293b;
}

.comic-card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.comic-info{
position:absolute;
bottom:0;
width:100%;
background:linear-gradient(transparent, rgba(0,0,0,0.9));
padding:10px;
box-sizing:border-box;
}

.comic-title{
font-size:14px;
font-weight:bold;
}

.episodes{
font-size:12px;
opacity:0.8;
}

.badge{
position:absolute;
top:8px;
right:8px;
padding:3px 6px;
font-size:11px;
border-radius:4px;
font-weight:bold;
}

.pg{
background:#16a34a;
}

.adult{
background:#dc2626;
}

</style>
</head>

<body>

<header>

<h1>Search Comic</h1>

<input type="text" id="searchInput" placeholder="Search comics...">

</header>

<div class="comic-grid" id="comicGrid"></div>


<script>

let comics = [];

fetch("comic.json")
.then(res => res.json())
.then(data => {

comics = data;

displayComics(comics);

});


function displayComics(list){

const grid = document.getElementById("comicGrid");

grid.innerHTML = "";

list.forEach(comic => {

const badgeClass = comic.badge === "18+" ? "adult" : "pg";

grid.innerHTML += `

<div class="comic-card">

<img src="${comic.cover}">

<div class="badge ${badgeClass}">
${comic.badge}
</div>

<div class="comic-info">

<div class="comic-title">
${comic.title}
</div>

<div class="episodes">
${comic.episodes} Episodes
</div>

</div>

</div>

`;

});

}


document.getElementById("searchInput")
.addEventListener("input", function(){

const value = this.value.toLowerCase();

const filtered = comics.filter(c =>
c.title.toLowerCase().includes(value)
);

displayComics(filtered);

});

</script>

</body>
</html>
