<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search - Comic PUR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#00d4ff;
--dark:#0a001f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#0a001f,#1a003f);
color:white;
font-family:'Segoe UI',system-ui,sans-serif;
min-height:100vh;
overflow-x:hidden;
}

main{
padding:60px 16px 40px;
max-width:900px;
margin:0 auto;
text-align:center;
}

.search-title{
font-family:'Orbitron',sans-serif;
font-size:3rem;
margin-bottom:40px;
color:#0a5cff;
text-shadow:0 0 15px rgba(0,90,255,0.6);
letter-spacing:2px;
}

.search-container{
position:relative;
max-width:600px;
margin:0 auto 50px;
}

.search-input{
width:100%;
padding:18px 24px;
font-size:1.2rem;
background:rgba(34,34,60,0.8);
border:2px solid rgba(0,212,255,0.4);
border-radius:50px;
color:white;
outline:none;
transition:.3s;
backdrop-filter:blur(8px);
}

.search-input:focus{
border-color:var(--primary);
box-shadow:0 0 25px rgba(0,212,255,0.5);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
max-width:1200px;
margin:0 auto;
}

.card{
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
transition:.3s;
position:relative;
border:1px solid rgba(0,212,255,0.15);
aspect-ratio:2/3;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 50px rgba(0,212,255,0.3);
border-color:var(--primary);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

a{
text-decoration:none;
color:white;
display:block;
height:100%;
}

.no-results{
grid-column:1/-1;
text-align:center;
font-size:1.4rem;
opacity:.7;
margin:60px 0;
}

@media(min-width:768px){
.grid{
gap:30px;
}

.search-title{
font-size:3.6rem;
}
}
</style>
</head>

<body>

<main>

<h1 class="search-title">Search Comic</h1>

<div class="search-container">
<input type="text"
id="searchInput"
class="search-input"
placeholder="Comic ka naam daalo..."
onkeyup="searchComics()">
</div>

<div class="grid" id="resultsGrid">
<div class="no-results">Kuch search karo bhai... 😄</div>
</div>

</main>

<script>

let comics=[];

fetch("comic.json")
.then(res=>res.json())
.then(data=>{
comics=data;
});

function searchComics(){

const input=document.getElementById("searchInput").value.toLowerCase().trim();
const grid=document.getElementById("resultsGrid");

grid.innerHTML="";

if(!input){
grid.innerHTML='<div class="no-results">Kuch search karo bhai... 😄</div>';
return;
}

const filtered=comics.filter(comic=>
comic.title.toLowerCase().includes(input)
);

if(filtered.length===0){
grid.innerHTML='<div class="no-results">Koi comic nahi mila... 😔</div>';
return;
}

filtered.forEach(comic=>{

const card=document.createElement("a");
card.href=comic.page;

card.innerHTML=`
<div class="card">
<img src="${comic.cover}" alt="${comic.title}" loading="lazy">
</div>
`;

grid.appendChild(card);

});

}

</script>

</body>
</html>
