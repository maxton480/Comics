<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search - Comic PUR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b1d3a;
font-family:'Poppins',sans-serif;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:25px 20px 15px;
position:sticky;
top:0;
background:#0b1d3a;
z-index:10;
}

.search-title{

font-family:'Orbitron',sans-serif;
font-size:32px;
color:#0a3cff;

text-shadow:
0 0 10px rgba(0,60,255,0.6),
0 0 25px rgba(0,60,255,0.4);

letter-spacing:2px;
margin-bottom:15px;

}

.search-box{
display:flex;
justify-content:center;
}

#searchInput{

width:90%;
max-width:450px;

padding:16px 20px;

border-radius:40px;
border:2px solid #1e40af;

background:#132a52;

color:white;

font-size:16px;

outline:none;

transition:0.25s;

box-shadow:0 0 15px rgba(0,0,0,0.4);

}

#searchInput:focus{

border-color:#2563eb;

box-shadow:0 0 20px rgba(37,99,235,0.6);

}

#searchInput::placeholder{
color:#94a3b8;
}

/* GRID */

.comic-grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));

gap:22px;

padding:20px;
max-width:1100px;
margin:auto;

}

/* CARD */

.comic-card{

position:relative;

border-radius:14px;
overflow:hidden;

background:#142850;

transition:0.3s;

box-shadow:0 6px 25px rgba(0,0,0,0.6);

}

.comic-card:hover{
transform:translateY(-6px) scale(1.04);
}

.comic-card img{

width:100%;
height:auto;   /* ORIGINAL SIZE */

display:block;

}

.comic-info{

position:absolute;

bottom:0;

width:100%;

padding:12px;

background:linear-gradient(transparent,rgba(0,0,0,0.9));

}

.comic-title{

font-size:15px;
font-weight:600;

}

.episodes{

font-size:12px;
opacity:0.8;

}

.badge{

position:absolute;

top:8px;
right:8px;

padding:4px 7px;

font-size:11px;

border-radius:6px;

font-weight:700;

}

.pg{
background:#16a34a;
}

.adult{
background:#dc2626;
}

.message{

text-align:center;
margin-top:40px;

opacity:0.6;

font-size:15px;

}

a{
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<header>

<div class="search-title">
Search Comic
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search comics...">
</div>

</header>

<div id="message" class="message">
Start typing to search comics
</div>

<div id="comicGrid" class="comic-grid"></div>

<script>

let comics=[];

fetch("comic.json")
.then(res=>res.json())
.then(data=>{
comics=data;
});

function displayComics(list){

const grid=document.getElementById("comicGrid");
const message=document.getElementById("message");

grid.innerHTML="";

if(list.length===0){

message.style.display="block";
message.innerText="No comics found";
return;

}

message.style.display="none";

list.forEach(comic=>{

const badgeClass=comic.badge==="18+"?"adult":"pg";
const badgeText=comic.badge==="PG"?"PG-13":comic.badge;

grid.innerHTML+=`

<a href="${comic.link}">

<div class="comic-card">

<img src="${comic.cover}" loading="lazy">

<div class="badge ${badgeClass}">
${badgeText}
</div>

<div class="comic-info">

<div class="comic-title">
${comic.title}
</div>

<div class="episodes">
${comic.episodes} Episodes
</div>

</div>

</div>

</a>

`;

});

}

document
.getElementById("searchInput")
.addEventListener("input",function(){

const value=this.value.toLowerCase().trim();

const grid=document.getElementById("comicGrid");
const message=document.getElementById("message");

if(value===""){

grid.innerHTML="";
message.style.display="block";
message.innerText="Start typing to search comics";

return;

}

const filtered=comics.filter(c=>
c.title.toLowerCase().includes(value)
);

displayComics(filtered);

});

</script>

</body>
</html>
