<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic - Comic PUR</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:linear-gradient(135deg,#0a001f,#1a003f);
color:white;
font-family:'Segoe UI',system-ui,sans-serif;
}

/* HEADER */

header{
padding:10px 16px;
display:flex;
align-items:center;
justify-content:space-between;
background:#0a001f;
border-bottom:1px solid rgba(0,212,255,.3);
height:64px;
}

.logo img{
width:52px;
height:52px;
border-radius:50%;
border:3px solid #00d4ff;
box-shadow:0 0 20px rgba(0,212,255,.6);
}

.heading-img{
max-width:220px;
margin:auto;
}

.search-icon{
width:60px;
cursor:pointer;
}

/* MAIN */

main{
padding:20px 16px;
max-width:900px;
margin:auto;
}

/* COVER */

.cover{
width:100%;
max-width:360px;
margin:auto;
display:block;
border-radius:14px;
box-shadow:0 12px 40px rgba(0,212,255,.3);
margin-bottom:30px;
}

/* TITLE */

.title{
font-size:26px;
font-weight:800;
text-align:center;
margin-bottom:8px;
}

.meta{
text-align:center;
margin-bottom:20px;
opacity:.8;
}

/* GENRE */

.genre{
text-align:center;
margin-bottom:20px;
}

.genre span{
background:#00d4ff20;
border:1px solid #00d4ff50;
padding:4px 10px;
margin:3px;
border-radius:20px;
font-size:12px;
}

/* SUMMARY */

.summary{
background:#160033;
padding:18px;
border-radius:12px;
line-height:1.6;
margin-bottom:30px;
border:1px solid rgba(0,212,255,.3);
}

/* EPISODE FINDER */

.search-bar{
width:100%;
padding:14px;
border-radius:30px;
border:2px solid #00d4ff;
background:#160033;
color:white;
margin-bottom:20px;
}

/* EPISODES GRID */

.episodes-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

.btn{
background:linear-gradient(45deg,#00d4ff,#ff69b4);
padding:12px;
border-radius:10px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
}

.btn:hover{
opacity:.85;
}

/* PAGINATION */

.pagination{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
margin-bottom:20px;
}

.page-btn{
padding:6px 12px;
border-radius:6px;
border:1px solid #00d4ff;
background:#00d4ff20;
color:#00d4ff;
cursor:pointer;
}

.page-btn.active{
background:#00d4ff;
color:black;
}

/* BACK */

.back{
text-align:center;
margin-top:40px;
}

.back a{
color:#aaa;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="../assets/heading.png">
</div>

<div>
<img src="../assets/logo-circle.png" class="heading-img">
</div>

<div>
<img src="../assets/search-icon.png" class="search-icon" onclick="window.location.href='../search.html'">
</div>

</header>

<main>

<img id="cover" class="cover">

<div class="title" id="title"></div>

<div class="meta" id="episodes"></div>

<div class="genre" id="genre"></div>

<div class="summary" id="summary"></div>


<h2 style="text-align:center;margin-bottom:15px;">Episodes</h2>

<input type="text" id="episodeSearch" class="search-bar" placeholder="Episode number search karo">


<div class="pagination" id="pagination"></div>

<div class="episodes-grid" id="episodesGrid"></div>


<div class="back">
<a href="../index.html">← Back to Home</a>
</div>

</main>


<script>

const urlParams = new URLSearchParams(window.location.search);
const slug = urlParams.get("slug");

let totalEpisodes = 0;
let readerPath = "";
let episodesPerPage = 20;
let currentPage = 1;

fetch("../comic.json")
.then(res=>res.json())
.then(data=>{

const comic = data.comics.find(c=>c.slug===slug);

if(!comic) return;

document.title = comic.title + " - Comic PUR";

document.getElementById("cover").src = comic.cover;
document.getElementById("title").innerText = comic.title;

document.getElementById("episodes").innerText =
"Total Episodes : " + comic.episodes;

document.getElementById("summary").innerText = comic.summary;

readerPath = "../" + comic.reader;
totalEpisodes = comic.episodes;

/* GENRE */

const genreDiv = document.getElementById("genre");

comic.genre.forEach(g=>{
genreDiv.innerHTML += `<span>${g}</span>`;
});

createPagination();
renderEpisodes();

});


function createPagination(){

const pagination=document.getElementById("pagination");
pagination.innerHTML="";

const totalPages=Math.ceil(totalEpisodes/episodesPerPage);

for(let i=1;i<=totalPages;i++){

const btn=document.createElement("button");

btn.className="page-btn";

if(i===currentPage) btn.classList.add("active");

btn.textContent=
`${(i-1)*episodesPerPage+1}-${Math.min(i*episodesPerPage,totalEpisodes)}`;

btn.onclick=()=>{

currentPage=i;
renderEpisodes();
createPagination();

};

pagination.appendChild(btn);

}

}


function renderEpisodes(){

const grid=document.getElementById("episodesGrid");

grid.innerHTML="";

const start=(currentPage-1)*episodesPerPage+1;
const end=Math.min(start+episodesPerPage-1,totalEpisodes);

for(let i=start;i<=end;i++){

grid.innerHTML+=`

<a href="${readerPath}ch${i}.html" class="btn">
Episode ${i}
</a>

`;

}

}


/* SEARCH */

document.getElementById("episodeSearch")
.addEventListener("input",function(){

const val=this.value.trim();

if(val===""){
renderEpisodes();
return;
}

const num=parseInt(val);

const grid=document.getElementById("episodesGrid");

grid.innerHTML="";

if(isNaN(num)||num<1||num>totalEpisodes){

grid.innerHTML=
"<p style='grid-column:1/-1;text-align:center;color:#aaa;'>Episode nahi mila</p>";

return;

}

grid.innerHTML=`

<a href="${readerPath}ch${num}.html" class="btn">
Episode ${num}
</a>

`;

});

</script>

</body>
</html>
